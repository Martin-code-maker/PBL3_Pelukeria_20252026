# ---- Subida de ficheros ----
# Tamaño máximo por fichero y por petición
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Carpeta donde se guardan las imágenes de las reservas
# Ruta relativa al directorio de trabajo (donde arranca el jar)
pelukeria.uploads.dir=uploads

# Mail - los valores reales van en application-local.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

