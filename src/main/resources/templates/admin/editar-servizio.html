<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head><title>Editar Servicio</title></head>
<body>
<div layout:fragment="content">
<div class="container py-4" style="max-width:500px">

    <h2 class="text-primary-custom mb-4">
        <i class="bi bi-scissors"></i>
        <span th:text="${servizio.id == null ? 'Nuevo servicio' : 'Editar servicio'}">Servicio</span>
    </h2>

    <form th:action="@{/admin/servicios/guardar}" method="post" class="card p-4">
        <!-- ID oculto para edición -->
        <input type="hidden" name="id" th:value="${servizio.id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="izena" class="form-control" required
                   th:value="${servizio.izena}" placeholder="Ej: Corte de pelo">
        </div>
        <div class="mb-3">
            <label class="form-label">Clave interna <small class="text-muted">(sin espacios)</small></label>
            <input type="text" name="kodea" class="form-control" required
                   th:value="${servizio.kodea}" placeholder="Ej: corte">
        </div>
        <div class="mb-3">
            <label class="form-label">Duración (minutos)</label>
            <input type="number" name="iraupena" class="form-control" required min="5" step="5"
                   th:value="${servizio.iraupena}">
        </div>
        <div class="mb-3">
            <label class="form-label">Precio (€)</label>
            <input type="number" name="prezioa" class="form-control" required min="0" step="0.5"
                   th:value="${servizio.prezioa}">
        </div>
        <div class="mb-3">
            <label class="form-label">Icono Bootstrap</label>
            <input type="text" name="ikonoa" class="form-control"
                   th:value="${servizio.ikonoa}" placeholder="Ej: bi-scissors">
            <small class="text-muted">
                Ver iconos en <a href="https://icons.getbootstrap.com" target="_blank">icons.getbootstrap.com</a>
            </small>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Guardar
            </button>
            <a th:href="@{/admin}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>

</div>
</div>
</body>
</html>
