<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title>Iniciar Sesión</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card">
                        <div class="card-header text-center">
                            <i class="bi bi-box-arrow-in-right fs-3"></i>
                            <h3 class="mt-2">Iniciar Sesión</h3>
                        </div>
                        <div class="card-body p-4">
                            <!-- Mensajes de error -->
                            <div th:if="${param.error}" class="alert alert-danger fade-in" role="alert">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                                Usuario o contraseña incorrectos
                            </div>
                            
                            <!-- Mensaje de logout -->
                            <div th:if="${param.logout}" class="alert alert-info fade-in" role="alert">
                                <i class="bi bi-info-circle-fill"></i>
                                Has cerrado sesión correctamente
                            </div>
                            
                            <!-- Mensaje de registro exitoso -->
                            <div th:if="${param.registered}" class="alert alert-success fade-in" role="alert">
                                <i class="bi bi-check-circle-fill"></i>
                                ¡Registro exitoso! Ahora puedes iniciar sesión
                            </div>
                            
                            <!-- Formulario de login -->
                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        <i class="bi bi-person"></i> Nombre de usuario
                                    </label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="username" 
                                           name="username" 
                                           required 
                                           autofocus
                                           placeholder="Introduce tu usuario">
                                </div>
                                
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        <i class="bi bi-lock"></i> Contraseña
                                    </label>
                                    <input type="password" 
                                           class="form-control" 
                                           id="password" 
                                           name="password" 
                                           required
                                           placeholder="Introduce tu contraseña">
                                </div>
                                
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                                    </button>
                                </div>
                            </form>
                            
                            <hr class="my-4">
                            
                            <div class="text-center">
                                <p class="mb-0">¿No tienes cuenta?</p>
                                <a th:href="@{/register}" class="btn btn-outline-primary mt-2">
                                    <i class="bi bi-person-plus"></i> Regístrate aquí
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
